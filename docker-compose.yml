services:
  app:
    image: hicsail/bwwc-wagegap:latest
    build: .
    ports:
      - "${BWWC_WEBSITE_PORT}:8080"
    environment:
      MONGO_URI: mongodb://mongo:27017/calculator
    depends_on:
      - mongo
    restart: always

  mongo:
    image: mongo:6.0.1
    volumes:
      - bwwc_website_mongo_data:/data/db
    restart: always

volumes:
  bwwc_website_mongo_data:
    external: true
